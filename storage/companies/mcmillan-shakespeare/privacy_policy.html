urrent\":[\"$\",\"$L9\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",[\"page\",\"privacy\",\"d\"],\"children\"],\"loading\":\"$undefined\",\"loadingStyles\":\"$undefined\",\"hasLoading\":false,\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"template\":[\"$\",\"$Lb\",null,{}],\"templateStyles\":\"$undefined\",\"notFound\":\"$undefined\",\"notFoundStyles\":\"$undefined\",\"childProp\":{\"current\":[\"$Lc\",\"$Ld\",null],\"segment\":\"__PAGE__\"},\"styles\":[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/7ac8cb26da507440.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\"}]]}],\"segment\":[\"page\",\"privacy\",\"d\"]},\"styles\":[]}],\"params\":{}}],null]}]]\n"])</script><script>self.__next_f.push([1,"1c:I[413,[\"281\",\"static/chunks/281-e8bc6e96ad05971c.js\",\"222\",\"static/chunks/222-4b8dc869e6106a05.js\",\"251\",\"static/chunks/251-63e2963e331c8cc9.js\",\"19\",\"static/chunks/19-06def68e732d74b8.js\",\"683\",\"static/chunks/683-be935b0c1348b011.js\",\"312\",\"static/chunks/312-a410d4aa8a9fd2f7.js\",\"305\",\"static/chunks/app/%5Bpage%5D/page-bdf86c3bc3cb0e0b.js\"],\"Image\"]\nf:T453,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e1. What are personal information and sensitive information?\u003c/strong\u003e\u003c/h3\u003e\u003cp\u003ePersonal information is defined in the Privacy Act 1988 (Cth). Generally, it is information or an opinion about an identified individual or an individual who is reasonably identifiable. This may include your name, address, telephone number, email address, profession or occupation.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eSensitive information includes:\u003c/p\u003e\u003cp\u003e•\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;information about your racial or ethnic background, political opinions, membership of political, professional or trade associations or trade unions, religious beliefs or affiliations, philosophical beliefs, sexual orientation or practices or criminal record (where that information is personal information);\u0026nbsp;\u003c/p\u003e\u003cp\u003e•\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;health information and genetic information; and\u003c/p\u003e\u003cp\u003e•\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;biometric templates and biometric information that is used for the purpose of automated biometric verification or biometric identification.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e"])</script><script>self.__next_f.push([1,"10:T1033,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e2. Types of personal information and sensitive information we collect\u003c/strong\u003e\u003c/h3\u003e\u003cp\u003eThe types of personal information we may collect (depending on the nature of our relationship and dealings\u003cbr\u003ewith you) include:\u003cbr\u003e• \u0026nbsp;your name\u003cbr\u003e• \u0026nbsp;your country of birth, passport details, visa details and drivers’ licence;\u003cbr\u003e• \u0026nbsp;address (residential and mailing address);\u003cbr\u003e• \u0026nbsp;contact details (telephone number, fax number and email address);\u003cbr\u003e• \u0026nbsp;age, date of birth, marital status and occupation;\u003cbr\u003e• \u0026nbsp;employment details and financial information (your salary, the name and address of your employer, and details of your work history and remuneration);\u003cbr\u003e• \u0026nbsp;information about your financial affairs (e.g. payment details, bank account details, and information about business and financial interests);\u003cbr\u003e• \u0026nbsp;government identifiers;\u003cbr\u003e• \u0026nbsp;profession, occupation and job title; and\u003cbr\u003e• \u0026nbsp;employee number\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eWe may also collect the following information depending on the products and services we provide you:\u003cbr\u003e• \u0026nbsp;credit card details;\u003cbr\u003e• \u0026nbsp;bank account numbers;\u003cbr\u003e• \u0026nbsp;details of income, assets, liabilities, expenses, credit history, credit worthiness; and\u003cbr\u003e• \u0026nbsp;other information as required by the Anti-Money Laundering Counter-Terrorism Financing Act 2006 (Cth).\u003c/p\u003e\u003cp\u003e\u003cbr\u003eMMS companies may collect sensitive information to the extent necessary to provide you with a specific\u003cbr\u003eproduct or service or where required by law.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003col style=\"padding-left:0px;\"\u003e\u003cli\u003e\u003cp style=\"margin-bottom:6.0pt;margin-right:0cm;margin-top:6.0pt;\"\u003e\u003cspan lang=\"EN-GB\"\u003eIf you are a client of Plan Partners, Plan Tracker or My Plan Support, we may collect or hold:\u003c/span\u003e\u003cbr\u003e1. \u003cspan lang=\"EN-GB\"\u003egovernment identifiers, including your NDIS participant number;\u003c/span\u003e\u003c/p\u003e\u003cp style=\"margin-bottom:6.0pt;margin-right:0cm;margin-top:6.0pt;\"\u003e2. a range of sensitive information about you including:\u003cbr\u003e• \u0026nbsp;racial or ethnic origin;\u003cbr\u003e• \u0026nbsp;health information (including information about your medical history and any disability or injury you may have);\u003cbr\u003e• \u0026nbsp;criminal activities you may have been involved in; and\u003cbr\u003e• \u0026nbsp;your biometrics (including photographs and voice or video recordings of you, where these materials are collected, stored and used for their biometric properties).\u003cbr\u003e2. other types of sensitive information if the information is required to provide you with a specific product or service, or where required by law. In some circumstances, we may collect sensitive information about you from a third party.\u003cbr\u003e\u0026nbsp;\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cspan class=\"cf0\"\u003ePlan Partners, Plan Tracker and My Plan Support generally do not collect other types of sensitive information about you that are not necessary to aid in service delivery, including:\u003c/span\u003e\u003cbr\u003e• \u0026nbsp;religious beliefs or affiliations;\u003cbr\u003e• \u0026nbsp;philosophical beliefs;\u003cbr\u003e• \u0026nbsp;sexual preferences or practices; and\u003cbr\u003e• \u0026nbsp;membership of political and professional or trade associations or trade unions\u003c/p\u003e\u003cp\u003e\u003cbr\u003eWhen you visit MMS websites, we may collect statistics on the number, date and time of your visit, the number of pages viewed and the manner in which you navigate through our sites.\u003cbr\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eWhen you call us, we may collect statistics on the number, date and time of your call and the manner in which you navigated through our telephony system. We may also monitor and/or record in-coming and outgoing telephone calls for taxation, verification, substantiation and quality assurance purposes.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eSome of our websites may provide you with the ability to make payments. This functionality may be provided by our third-party payment processors. If you choose to make a payment, the third-party payment processor will receive certain information about you and your transaction (including the transaction details and your location data) in order to process your payment and perform related functions, such as fraud detection.\u0026nbsp;\u003c/p\u003e"])</script><script>self.__next_f.push([1,"11:Tb40,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e3. Why we collect your personal information and sensitive information\u003c/strong\u003e\u003c/h3\u003e\u003cp\u003eWe collect your personal information (and, where applicable, your sensitive information) to perform our\u003cbr\u003ebusiness activities and functions. We collect, hold, use and disclose your personal information (and, where\u003cbr\u003eapplicable, sensitive information) to provide you with products and services you have requested, and for the\u003cbr\u003eadministration of those products and services.\u003c/p\u003e\u003cp\u003e\u003cbr\u003eWe may also collect, hold, use and disclose your personal information (and, where applicable, sensitive\u003cbr\u003einformation) to:\u003cbr\u003e• \u0026nbsp;conduct our business administration and operations (such as accounting, risk management, record keeping, statistical analysis, research, planning, systems development, testing and staff training);\u003cbr\u003e• \u0026nbsp;conduct our marketing (including direct marketing and Internet-based targeted advertising), planning, new product or service development, quality control and research;\u003cbr\u003e• \u0026nbsp;conduct customer satisfaction surveys / Net Promoter Score;\u003cbr\u003e• \u0026nbsp;answer your enquiries and respond to any complaints made by you;\u003cbr\u003e• \u0026nbsp;send you material (or show you advertisements) about other products and services offered by us;\u003cbr\u003e• \u0026nbsp;assess and monitor the use and performance of our websites and provide you with access to secure areas of our websites;\u003cbr\u003e• \u0026nbsp;up-date our records and keep your contact detail updated; and\u003cbr\u003e• \u0026nbsp;comply with any law, rule or regulation or request or direction from any Court, regulator, law enforcement body or governmental authority.\u003c/p\u003e\u003cp\u003e\u003cbr\u003eWe may share personal information about you with our related bodies corporate, contractors and service\u003cbr\u003eproviders for any of the purposes outlined above.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003cspan lang=\"EN-US\"\u003eIf you are a client of Plan Partners, Plan Tracker or My Plan Support, we:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e• \u0026nbsp;will generally only collect personal and sensitive information if you consent and it is reasonably necessary for, or directly related to, \u003cspan class=\"cf0\"\u003eone or more of Plan Partners', Plan Tracker’s or My Plan Support’s \u003c/span\u003efunctions or activities. Sometimes we may collect sensitive information without your consent, such as when it is required or authorised by a law, or court or tribunal order; and\u003cbr\u003e• \u0026nbsp; may collect, hold, use and disclose your information for purposes including the administration of your NDIS funds, co-ordination of your disability support and liaising with your support providers and with the National Disability Insurance Agency (NDIA), as well as the other purposes specified in this \u003cspan lang=\"EN-US\"\u003ePrivacy Policy and the Plan Partners Privacy Policy, the Plan Tracker Privacy Policy or the My Plan Support Privacy Policy (as applicable).\u003c/span\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"12:T6da,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e4. How we collect your personal information and sensitive information\u003c/strong\u003e\u003c/h3\u003e\u003cp\u003eWhere it is reasonable and practical to do so, we will always collect personal information and sensitive information directly from you. How we collect your personal information will depend on how you interact with us. For example, we may collect it through your access and use of our websites, during your conversations with our representatives or from application forms you complete.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eThere are occasions when we may need to collect your personal information or sensitive information from third parties, with or without your direct involvement. We will generally obtain your prior consent if we need to obtain your sensitive information from third parties (unless a relevant exception applies).\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eWe may use third party service providers to assist us with collecting information. For example, we may use cookies and other tracking technologies provided by third party service providers to help us collect information about how you are using our websites. See sections 7 and 11 of this Privacy Policy for further information.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eDepending on the products or services you request or receive, the third parties from whom we may collect personal information include your employer, market research organisations, third party brokers and agents, credit reporting bodies, government agencies, your representatives and your advisers and other organisations who, jointly with us, provide products or services to you. We may also collect sensitive information from medical practitioners, health and disability support providers.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e"])</script><script>self.__next_f.push([1,"13:Te4f,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e5. Disclosing your personal information and sensitive information\u003c/strong\u003e\u003c/h3\u003e\u003cp\u003eWe may disclose your personal information to another person or organisation. Depending upon the products\u003cbr\u003eor services you have requested, we may disclose personal information about you to:\u003cbr\u003e• \u0026nbsp;your employer;\u003cbr\u003e• \u0026nbsp;our employees and related bodies corporate;\u003cbr\u003e• \u0026nbsp;\u003cspan class=\"cf0\"\u003eour agents, contractors, service providers, business partners and referral partners, including mail\u003c/span\u003e houses (including third parties who help us to send our emails), technology service providers (including web hosting and web analytics), advertising service providers (including online advertising networks and social media platforms that we use to serve our ads), IT systems administrators or professional advisers such as accountants,\u003cbr\u003esolicitors, business advisers and consultants;\u003cbr\u003e• \u0026nbsp;regulatory bodies, government agencies and law enforcement bodies, including the Australian Taxation Office, Centrelink, the NDIA and the NDIS Quality and Safeguards Commission (NDIS Commission);\u003cbr\u003e• \u0026nbsp;financial institutions, payment processors and payment systems operators, credit reporting bodies or debt collection agencies in relation to the processing, administration and management of products and services requested by you;\u003cbr\u003e• \u0026nbsp;persons acting on your behalf, including your legal adviser, financial adviser, executor, administrator, trustee, guardian or attorney;\u003cbr\u003e• \u0026nbsp;insurers and reinsurers in relation to insurance products and services requested by you;\u003cbr\u003e• \u0026nbsp;superannuation funds in relation to the processing of contributions;\u003cbr\u003e• \u0026nbsp;other organisations or firms, who jointly with us, provide products or services to you;\u003cbr\u003e• \u0026nbsp;motor vehicle dealers in relation to the sourcing and remarketing of your motor vehicle;\u003cbr\u003e• \u0026nbsp;State and Territory road authorities in relation to motor vehicle registration and compulsory third party insurance;\u003cbr\u003e• \u0026nbsp;guarantors and prospective guarantors in relation to any applications for credit or lease applications made by you; and\u003cbr\u003e• \u0026nbsp;fuel companies to enable those companies to properly record fuel purchases made by you.\u003cbr\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003e\u003cspan class=\"cf0\"\u003eIf you are a client of Plan Partners, Plan Tracker or My Plan Support,\u003c/span\u003e we will not give your personal information to government agencies, private sector organisations, or anyone else unless you consent, or we are permitted to do so by law, or one of the following other exceptions applies:\u003c/p\u003e\u003cp\u003e• \u0026nbsp;you would reasonably expect us to use the information for that purpose;\u003cbr\u003e• \u0026nbsp;it is legally required or authorised, such as by an Australian law, or court or tribunal order;\u003cbr\u003e• \u0026nbsp;formally requested by regulatory bodies, government agencies and law enforcement bodies, including the NDIA and the NDIS Commission;\u003cbr\u003e• \u0026nbsp;we reasonably believe that it is necessary to lessen or prevent a serious threat to the life, health or safety of any individual, or to public health or safety; and\u003cbr\u003e• \u0026nbsp;we have reason to suspect that unlawful activity, or misconduct of a serious nature, that relates to our functions or activities has been, is being or may be engaged in and we reasonably believe that it is necessary for us to take appropriate action in relation to the matter.\u003c/p\u003e\u003cp\u003e\u003cbr\u003eIn the unlikely event that the assets and operations of our business are sold to another party, our records of personal information and sensitive information will be transferred to that party.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"14:T24f0,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e7. Marketing and advertising\u003c/strong\u003e\u003c/h3\u003e\u003cp\u003eWe may use your information to offer you products or services we believe may be of interest to you. These may include products and services of MMS companies and brands, and products and services of carefully selected third party companies and brands that we work with. We may contact you by various means including telephone, mail, SMS, fax or email. You can notify us at any time if you no longer wish to receive marketing communications. Our contact details are set out at the end of this policy. We do not sell personal information to other organisations to allow them to send their direct marketing to you.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHow we conduct Internet advertising\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWe may also collect and use information about you for the purposes of online targeted advertising services that help our advertisements (ads) to reach you (and other people who may be interested in our products and services) on websites, apps and social media platforms across the Internet.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eThese online targeted advertising services are operated by third party vendors.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eThe advertising service providers that we currently use include Meta (which includes Facebook and Instagram), Google, LinkedIn, Microsoft Bing, Adobe, TikTok and Reddit.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eSome of these services work by using non-identifying data about your behaviour and demographics that has been collected through cookies and other tracking technologies (such as tracking pixels, web beacons and device identifiers (such as Android Advertising Identifier or Advertising Identifier for iOS)) when you use the Internet, including when you move between different websites and apps and use different devices. For example, third-party vendors may use cookies and/or device identifiers to serve ads based on your past visits to our websites.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eOther services require us to use limited amounts of your personal information. For example, we may include your information in a customer list that we provide to selected online advertising service providers (such as Meta, LinkedIn, Google, Microsoft Bing, Adobe, TikTok and Reddit) so that we can conduct audience-based advertising. This allows us to show our ads to you (if you also use those platforms) and to other users of those platforms who share similar characteristics with you. The customer list is usually hashed (to improve security and confidentiality) before it’s processed by the service provider to target and serve our ads.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eFor example, we may use Microsoft Clarity and Microsoft's Universal Event Tracking (UET) feature for online advertising. Where we do so, Microsoft will collect or receive personal information from the user or us to provide the relevant Microsoft advertising services. Microsoft's Privacy Statement can be found here: \u003ca href=\"https://privacy.microsoft.com/en-au/privacystatement\"\u003ehttps://privacy.microsoft.com/en-au/privacystatement\u003c/a\u003e\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eThe data that is collected through these cookies and other tracking technologies, or provided by us, may be combined with other data (supplied by our advertising service provider, or third parties) to improve the targeting and serving of ads.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eOur online advertising service providers also help us by measuring the effectiveness of our ad campaigns (e.g. conversion tracking) and providing us with analytics data that we use to inform and optimise our ad campaigns. These analytics are based on usage data that may be collected through cookies and other tracking technologies (such as tracking pixels and web beacons). This usage data may include, for example, information about whether you visited our website (and/or submitted a query or request to be contacted) after seeing or clicking on one of our ads. The analytics data we receive from our advertising service providers based on this usage data is generally aggregated and non-identifying.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eOur advertising service providers may also retain and use the usage data that they collect through these tracking technologies for their own purposes, which may include:\u003cbr\u003e• correlating or matching the data with other data about you, if you use their services;\u003cbr\u003e• improving the effectiveness of their services and advertising platforms;\u003cbr\u003e• improving the user experience of, promoting and ensuring the safety and security of, and maintaining the integrity of their products and services;\u003cbr\u003e• research and development;\u003cbr\u003e• optimising advertising decisioning and content personalisation; and\u003cbr\u003e• producing benchmark reports for their advertising customers.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eThis usage data will be stored on our advertising service provider's servers, which may be located outside of Australia. Our advertising service providers may also share the usage data to third parties, some of whom may be located in countries other than Australia.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eFor further information about how our advertising service providers handle and use the usage data that they collect from our websites, please refer to their privacy policies (listed at the end of this Section 7).\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eWe may permit third party vendors (including the advertising service providers listed above) to deploy cookies and other tracking technologies (such as tracking pixels, IP addresses and web beacons) on and through our website and emails to collect or receive information about you from our websites, our emails and your activities elsewhere on the Internet. This information may be used to provide measurement / analytics services and to target and deliver ads, as described above.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eBy using our websites and social media pages or otherwise interacting with us, you consent to our third party advertising service providers collecting, receiving and processing data about you in the manner and for the purposes set out above. You may have options to limit our third party advertising service providers from collecting data about you through cookies and other tracking technologies when you use our websites - please see section 11 of this Privacy Policy for further information.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYour choices in relation to Internet Advertising\u003c/strong\u003e\u003cbr\u003eWhen we use any advertising service that requires us to use or disclose your personal information, we will only do so if we are permitted to do so by applicable privacy laws. You can notify us at any time if you would like us to stop using your personal information for these targeted advertising purposes. Our contact details are set out at the end of this policy.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eYour web browser and/or mobile device may provide you with settings that allow you to disable or opt-out of some of the tracking technologies that are used to collect data that is used for analytics and ad targeting and serving purposes (such as cookies, device identifiers and advertising identifiers). These options may vary depending on the specific web browser or mobile device that you are using. See section 11 of this Privacy Policy for further information.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eYou can learn more about opting out of receiving interest-based Internet ads in general at\u003cbr\u003ewww.optout.aboutads.info, and www.networkadvertising.org/choices. You can also opt-out of certain online targeted advertising networks directly by visiting:\u003cbr\u003e• the Digital Advertising Alliance’s opt-out portal at: http://optout.aboutads.info/; and\u003cbr\u003e• the Network Advertising Initiative’s opt-out portal: https://optout.networkadvertising.org/\u0026nbsp;\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eYou can also learn more about how our advertising service providers collect and use data for interest-based advertising purposes (and what options they offer for managing how your data is collected and used as part of their services) by visiting the following pages on their websites:\u003c/p\u003e\u003cp\u003e• \u0026nbsp;Facebook: https://www.facebook.com/help/109378269482053/?helpref=hc_fnav\u003cbr\u003e(Facebook's privacy policy can be found here: https://www.facebook.com/privacy/policy/)\u003cbr\u003e• \u0026nbsp;Instagram: https://help.instagram.com/1415228085373580\u003cbr\u003e(Instagram's privacy policy can be found here: https://privacycenter.instagram.com/policy)\u003cbr\u003e• \u0026nbsp;Google (including YouTube): https://policies.google.com/technologies/partner-sites\u003cbr\u003e(Google's privacy policy can be found here: https://policies.google.com/privacy/embedded?hl=enUS)\u003cbr\u003e• \u0026nbsp;LinkedIn: https://www.linkedin.com/help/linkedin/answer/a1342443\u003cbr\u003e(LinkedIn's privacy policy can be found here: https://www.linkedin.com/legal/privacy-policy)\u003cbr\u003e• \u0026nbsp;Microsoft Ads: https://account.microsoft.com/privacy/ad-settings/\u003cbr\u003e(Microsoft's privacy policy can be found here: https://www.microsoft.com/engb/privacy/privacystatement)\u003cbr\u003e• \u0026nbsp;Adobe: https://www.adobe.com/au/privacy/opt-out.html\u003cbr\u003e(Adobe's privacy policy can be found here: https://www.adobe.com/au/privacy/policy.html)\u003cbr\u003e• \u0026nbsp;TikTok: https://www.tiktok.com/privacy/ads-and-your-data/en\u003cbr\u003e(TikTok's privacy policy can be found here: https://www.tiktok.com/legal/page/us/privacy-policy/en)\u003cbr\u003e• \u0026nbsp;Reddit: https://support.reddithelp.com/hc/en-us/articles/12731820767764-Control-the-ads-you-seeon-Reddit\u003cbr\u003e(Reddit's privacy policy can be found here: https://www.reddit.com/policies/privacy-policy)\u003c/p\u003e"])</script><script>self.__next_f.push([1,"15:T83a,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e8. Protection of your personal information\u003c/strong\u003e\u003c/h3\u003e\u003cp class=\"p1\"\u003eWe take reasonable steps to make sure your personal information is protected from misuse and loss and from unauthorised access, modification or disclosure. We may hold your information in either electronic or hard copy form. In some cases, we store records on third party servers, some of which may be located overseas.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWe use a range of security measures to protect the personal information we hold, including by implementing IT security tools to protect our electronic databases.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWe take reasonable steps to make sure that personal information is destroyed or de-identified when no longer needed.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWhen browsing our web sites, you acknowledge that the internet is not always a secure environment and that the computer and network you use contribute to the overall level of effective protection in place. You further acknowledge that any transmission of information over the internet is out of our control before it reaches our system. Only once we receive your transmission, we can take reasonable steps to safeguard its security.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eIn order to protect your personal information online, we ask that you observe the security requirements relating to the protection of your user identification number and/or password used to access your online account. We recommend that you:\u003c/p\u003e\u003cp\u003echange your password on initial access to our website;\u003cbr\u003e• \u0026nbsp;ensure the user identification number given to you is kept securely;\u003cbr\u003e• \u0026nbsp;destroy any documentation (including any email) we issue containing your password;\u003cbr\u003e• \u0026nbsp;memorise your user identification number and password;\u003cbr\u003e• \u0026nbsp;do not tell anyone of your user identification number and password;\u003cbr\u003e• \u0026nbsp;immediately telephone us if you suspect your online account or related email account has been breached.\u003cbr\u003e\u0026nbsp;\u003c/p\u003e"])</script><script>self.__next_f.push([1,"16:T102e,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e10. Accessing or correcting your information\u003c/strong\u003e\u003c/h3\u003e\u003cp\u003eYou may request access to any personal information or sensitive information that we hold about you. The type of information you request will determine the length of time we take to respond. We will generally respond using the same communication method by which your request was originally made.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eIf you believe that personal information or sensitive information that we hold about you is out-of-date, incomplete, inaccurate, irrelevant or misleading, then you may request that we correct it.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eIf you wish to request access to, or correction of, your information please contact us using the contact details in section 14 of this Privacy Policy.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eOn occasion we will ask that you put your request in writing. This may include instances where you want copies of material or access to archived information or if the nature of your application makes it necessary for us to retain a record of your request.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eYou may be able to access some personal information via our customer service website. Access to personal information via the customer service website requires the use of your unique user identification number and password. No personal information is openly posted on the Internet. If you have difficulty finding the information you want or in using the website, please contact us.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003e\u003cspan class=\"cf0\"\u003eIf you are a client of Plan Partners, Plan Tracker or My Plan Support,\u003c/span\u003e it is also possible to access, and correct documents held by us under the Freedom of Information Act 1982 (the FOI Act). In some circumstances we will suggest that you make your request for personal information under the FOI Act. This is because:\u003c/p\u003e\u003cp\u003ean FOI access request can relate to any document in our possession and is not limited to personal\u003cbr\u003einformation;\u003cbr\u003e• \u0026nbsp;the FOI Act contains a consultation process for dealing with requests for documents that contain personal or business information about another person;\u003cbr\u003e• \u0026nbsp;you can complain to the Australian Information Commissioner about what we do under the FOI Act; and\u003cbr\u003e• \u0026nbsp;if you are refused access under the FOI Act you have a right to apply for internal review or Information Commissioner review of the access refusal decision.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eFind out more information about how to make a request under the FOI Act on the Australian Information Commissioner's Freedom of Information webpage: \u003ca href=\"https://www.oaic.gov.au/freedom-of-information/the-foiact/\"\u003ehttps://www.oaic.gov.au/freedom-of-information/the-foiact/\u003c/a\u003e\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eYou can also make a request under the FOI Act by emailing \u003ca href=\"mailto:foi@ag.gov.au\"\u003efoi@ag.gov.au\u003c/a\u003e\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eIn some circumstances, we may charge an administration fee to retrieve and provide you with access to your information, based on our reasonable costs in providing the information to you. If we intend to charge an administration fee we will give you an estimate of this fee so you can confirm you still want us to proceed with your request.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eWe do not impose any charge for submitting a request for access or correction, or for any activities required for us to correct information or update our records in response to a correction request. We are entitled to refuse you access to (or correction of) your information in certain circumstances. For example:\u003c/p\u003e\u003cp\u003e• \u0026nbsp;you may not be able to access personal information that:\u003cbr\u003e\u0026nbsp; \u0026nbsp;- would reveal personal information or sensitive information about another person and have an unreasonable impact on their privacy;\u003cbr\u003e\u0026nbsp; \u0026nbsp;- impact a commercially sensitive decision making process; or\u003cbr\u003e\u0026nbsp; \u0026nbsp;- which we are prevented by law from disclosing; and\u003cbr\u003e• we may refuse to correct any of your personal information if we do not agree that it requires correction.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eIf we refuse your request, we will provide you with our reasons for the refusal.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e"])</script><script>self.__next_f.push([1,"17:T1e0c,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e11. Cookies and other tracking technologies on our websites\u003c/strong\u003e\u003c/h3\u003e\u003cp class=\"p1\"\u003eWe may use cookies and other tracking technologies (such as tracking pixels and web beacons) on our websites to collect various information about how you interact with our websites. This website usage data is not intended to identify any particular user, but in some cases may include personal identifiers (e.g. IP address, device IDs and session details) and details of your user interactions on our website (e.g. what pages you visit and what you choose to click on).\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWhen you access our website, we may send a “cookie” (which is a small summary file containing a unique ID number) to your computer or device. This enables us to recognise your computer and greet you each time you visit our website without bothering you with a request to register. It also enables us to keep track of products or services you view so that we can send you news about those products or services.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWe also use cookies and other tracking technologies to conduct website analytics - for example, to measure traffic patterns, to determine which areas of our website have been visited, to understand which individuals or companies / brands may be interested in our products and services, and to measure transaction patterns in the aggregate. We use this to understand our users’ habits so that we can improve our websites and other online products and services, as well as for other market research purposes.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWe may use cookies to log IP addresses (that is, the electronic addresses of computers connected to the internet) to analyse trends, administer the website, track users movements, and gather broad demographic information.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWebsite analytics products that we use on our websites include:\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003e• \u0026nbsp;Microsoft Clarity:\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWe partner with Microsoft Clarity and Microsoft Advertising to capture how you use and interact with our website through behavioural metrics, heatmaps, and session replay so that we can improve the user experience of our websites, and better market our products and services. Microsoft Clarity captures website usage data (e.g. how a webpage is rendering, user interactions such as mouse movements, clicks, scrolls etc) using first and third-party cookies and other tracking technologies to determine the popularity of products/services and online activity. Additionally, we use this information for site optimisation, advertising, bug fixing and overall customer experience.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eMicrosoft may collect data about you (including personal information) when you visit and interact with our websites and may use this data to provide Microsoft Advertising. For more information about how Microsoft collects and uses your data, visit the Microsoft Privacy Statement.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eMicrosoft uses the system built by the Digital Advertising Alliance to enable opt-out experiences for customers. You can opt out of Clarity telemetry by selecting Microsoft \u003ca href=\"https://optout.aboutads.info/\"\u003e\u003cstrong\u003ehere\u003c/strong\u003e\u003c/a\u003e. If you install the Protect My Choices app for your browser, you can ensure your opt-out preference is saved. In addition, Clarity supports \u003ca href=\"https://globalprivacycontrol.org/\"\u003e\u003cstrong\u003eGlobal Privacy Control\u003c/strong\u003e\u003c/a\u003e.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003e• \u0026nbsp;Dealfront:\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWe use a service provided by Dealfront Germany GmbH (Dealfront) to analyse traffic and usage of some of websites and assist us to understand which companies and brands are visiting those websites. We use this information to inform our advertising and marketing efforts.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eDealfront's service works by placing a Dealfront cookie onto your device that collects information about your your activities on the website including: (i) Source and Medium Source, Medium, Campaign, Keyword, if applicable (from UTMs or google analytics); (ii) Visitor ID number (as set by the Dealfront cookie); (iii) your IP address; (iv) your behaviour / activities on the website (e.g. (sub)pages visited, time and date of visit, duration of visit). Dealfront's handling of this data is subject to our \u003ca href=\"https://marketing.dealfront.com/inside-eea-data-processing-agreement-dealfront-en.pdf\"\u003e\u003cstrong\u003eData Processing Agreement\u003c/strong\u003e\u003c/a\u003e with Dealfront, where Dealfront acts as our data processor.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eYour use of our website will not be impacted if you choose to disable the Dealfront cookie (see \"Your choices in relation to cookies and other tracking technologies\" below).\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eDealfront analyses the data in conjunction with other information that Dealfront has previously collected from other sources (for further details, click \u003ca href=\"https://marketing.dealfront.com/privacy-information-for-data-subjects-en.pdf\"\u003e\u003cstrong\u003ehere\u003c/strong\u003e\u003c/a\u003e), and uses the results of this analysis to provide us with intelligence about the companies and brands that our website visitors (including you) may represent.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eDealfront is located in Germany, and the information collected through the Dealfront cookie may be processed in the Federal Republic of Germany and other countries within the European Union and European Economic Area.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eWe also use cookies as part of our online targeted advertising activities (see section 7 of this Privacy Policy above).\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003e\u003cstrong\u003eYour choices in relation to cookies and other tracking technologies\u003c/strong\u003e\u003c/p\u003e\u003cp class=\"p1\"\u003eIf you do not wish to receive cookies, you can set your web browser or mobile device so that your browser or device does not accept them.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u0026nbsp;\u003c/p\u003e\u003cp class=\"p1\"\u003eMost web browsers have features that allow you to manage and control the use of cookies by the sites that you visit (including ours), and to see and delete cookies stored on your device and to block cookies from all or selected sites. For information on how to use these settings in some of the more common browsers, please use the links below:\u003c/p\u003e\u003cp\u003e• \u0026nbsp; Mozilla Firefox: https://support.mozilla.org/en-US/kb/cookies-information-websites-store-on-yourcomputer\u003cbr\u003e• \u0026nbsp; Google Chrome: https://support.google.com/chrome/answer/95647\u003cbr\u003e• \u0026nbsp; Microsoft Edge: https://support.microsoft.com/en-us/help/4027947/microsoft-edge-delete-cookies\u003cbr\u003e• \u0026nbsp; Apple Safari: \u003ca href=\"https://support.apple.com/guide/safari/manage-cookies-and-website-datasfri11471/mac\"\u003ehttps://support.apple.com/guide/safari/manage-cookies-and-website-datasfri11471/mac\u003c/a\u003e\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eYou can also use your mobile device settings to control your mobile advertising identifiers, which are used to track your activity across different apps and show you personalised ads. Please refer to your mobile device's documentation for further information.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e\u003cp\u003eSome of the tracking technologies that we use may collect data about your use of our websites without using cookies. If you wish to opt-out of data collection by these other types of tracking technologies, you may be able to do so by installing and configuring appropriate ad-blockers or no-script plugins / extensions in your web browser.\u003c/p\u003e\u003cp\u003e\u0026nbsp;\u003c/p\u003e"])</script><script>self.__next_f.push([1,"18:T507,"])</script><script>self.__next_f.push([1,"\u003ch3 style=\"color:#212529;font-size:24px;line-height:36px;margin:20px 0;\"\u003e\u003cstrong\u003e12. Do we disclose your personal information to anyone outside Australia?\u003c/strong\u003e\u003c/h3\u003e\u003cp class=\"p1\"\u003eMMS's business activities are conducted in Australia and overseas. In order to provide our services to our customers we may engage other Service Providers to perform certain functions. In the ordinary course of business (and unless we have specifically agreed otherwise with a particular individual or organisation), these functions may involve the hosting or accessing of personal information (which may also include credit information) by the Service Provider outside Australia. At the present time, certain MMS's Service Providers may disclose personal information outside of Australia to countries including: The United States of America, the Republic of Ireland, India, China, Malaysia, Singapore, Sri Lanka and the Philippines. The McMillan Shakespeare 's overseas service providers may be required to disclose certain personal information and sensitive information due to their own regulatory obligations under foreign laws. The Privacy Act 1988 (Cth) does not require the MMS to prevent such disclosures, where the disclosur
